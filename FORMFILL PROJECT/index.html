<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Fill Document</title>
</head>
<style>
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    min-height: 100vh;
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
}

h1{
    color: #357abd;
    margin-bottom: 25px;
    font-size: 35px;
}

body > div{
    width: 350px;
    margin: 10px 0;
    color: white;
    font-size: 17px;
}

input,
select,
textarea{
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 12px;
    outline: none;
    font-size: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

textarea{
    resize: none;
}

input:focus,
select:focus,
textarea:focus{
    border: 2px solid #4a90e2;
}

button{
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    background: #4a90e2;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 15px;
}

button:hover{
    background: #357abd;
    transform: translateY(-2px);
}

a{
    color: white;
    text-decoration: none;
    font-weight: bold;
}

a:hover{
    text-decoration: underline;
}

/* Glass Effect Box */
body::before{
    content: "";
    position: absolute;
    width: 450px;
    height: 835px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    z-index: -1;
}
.reset{
    text-align: center;
}
.radio{
    display: flex;
    gap: 25px;
    color: white;
    font-size: 18px;
    margin-top: 15px;
}

.radio label{
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
}
</style>
<body>
    <h1>Fill Your Details</h1>
<div>
    Firts Name : <input type="text" placeholder="Enter Your First Name">

</div>
    <div>
        Last Name : <input type="text" placeholder="Enter Your Surname">
    </div>
    <div>
        Email : <input type="text" placeholder="Email">
    </div>
    <div>
        Phone No : <input type="text" placeholder="phoneNo">
    </div>
    <div>
        Passwoed : <input type="text" placeholder="Enter your password">
    </div>
    <div class="radio">
    <label>
        <input type="radio" name="gender"> Male
    </label>

    <label>
        <input type="radio" name="gender"> Female
    </label>

    <label>
        <input type="radio" name="gender"> Other
    </label>
</div>
    <div>
        <label>Education :</label>
        <Select>Education
            <option>Graduate</option>
            <option>Masters</option>
            <option>12th</option>
            <option>10th</option>
            <option>ITI</option>
            <option>Other</option>
        </Select>
    </div>
    <div>
        Address : <input type="text" placeholder="Complete Address With Pin Code">
    </div>
    <div>
        Your Photo : <input type="file" name="" id="">
    </div><br>
    <div>
        Write About Yourself : <br> <textarea name="" cols="30" rows="10"></textarea>
    </div>
    <Button>Submit</Button> <a href="signin.html"><button>Sign In</button></a>
    <div class="reset">
        <a href="" target="_blank">reset your form?</a>
    </div>
</body>
</html>
